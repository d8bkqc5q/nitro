name: ShellCheck CI
run-name: ShellCheck CI triggered from @${{ github.actor }} of ${{ github.head_ref
  }}
'on':
  workflow_dispatch: null
  merge_group: null
  pull_request: null
  push:
    branches:
    - master
    - main
jobs:
  shellcheck:
    name: Run ShellCheck
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Run ShellCheck
      uses: ludeeus/action-shellcheck@master
      with:
        ignore_paths: ./fastcache/** ./contracts/** ./safe-smart-account/** ./go-ethereum/**
          ./nitro-testnode/** ./brotli/** ./crates/**
